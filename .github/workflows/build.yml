name: Release on Main Push

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install frontend dependencies
        run: bun install

      - name: Install Tauri CLI globally
        run: bun install -g @tauri-apps/cli

      # 暂时跳过签名以确保构建成功
      - name: Build the app with Bun
        run: bun tauri build
        env:
          CI: false
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # 暂时注释掉签名，确保构建能完成
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}

      - name: Generate friendly tag name
        id: tag
        run: |
          # 使用时间戳作为标签名，格式: build-YYYYMMDD-HHMMSS
          $timestamp = Get-Date -Format "yyyyMMdd-HHmmss"
          $tagName = "build-$timestamp"
          echo "TAG_NAME=$tagName" >> $env:GITHUB_OUTPUT

          # 生成版本号（用于显示）
          $version = "${{ github.sha }}".Substring(0, 7)
          echo "VERSION=$version" >> $env:GITHUB_OUTPUT
        shell: pwsh

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.TAG_NAME }}
          name: "Demo App ${{ steps.tag.outputs.TAG_NAME }}"
          body: |
            Built from commit ${{ github.sha }}

            **Build information:**
            - Commit: ${{ github.sha }}
            - Build time: ${{ steps.tag.outputs.TAG_NAME }}

            **Build artifacts:**
            - Main executable: demo.exe
            - MSI installer: demo_0.1.0_x64_en-US.msi
            - NSIS installer: demo_0.1.0_x64-setup.exe
          draft: false
          prerelease: true
          files: |
            src-tauri/target/release/demo.exe
            src-tauri/target/release/bundle/msi/demo_0.1.0_x64_en-US.msi
            src-tauri/target/release/bundle/nsis/demo_0.1.0_x64-setup.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
