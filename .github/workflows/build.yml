name: Release on Main Push

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install frontend dependencies
        run: bun install

      - name: Install Tauri CLI globally
        run: bun install -g @tauri-apps/cli

      - name: Build the app with Bun
        run: bun tauri build
        env:
          CI: false
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # 启用签名，确保生成 .sig 文件
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}

      - name: Generate friendly tag name
        id: tag
        run: |
          $timestamp = Get-Date -Format "yyyyMMdd-HHmmss"
          $tagName = "build-$timestamp"
          echo "TAG_NAME=$tagName" >> $env:GITHUB_OUTPUT
          $version = "${{ github.sha }}".Substring(0, 7)
          echo "VERSION=$version" >> $env:GITHUB_OUTPUT
        shell: pwsh

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.TAG_NAME }}
          name: "Demo App ${{ steps.tag.outputs.TAG_NAME }}"
          body: |
            Built from commit ${{ github.sha }}

            **Build information:**
            - Commit: ${{ github.sha }}
            - Build time: ${{ steps.tag.outputs.TAG_NAME }}

            **Build artifacts:**
            - Main executable: demo.exe
            - MSI installer: demo_0.1.0_x64_en-US.msi
            - NSIS installer: demo_0.1.0_x64-setup.exe
          draft: false
          prerelease: true   # main 分支推送均视为预发布
          files: |
            src-tauri/target/release/demo.exe
            src-tauri/target/release/bundle/msi/demo_0.1.0_x64_en-US.msi
            src-tauri/target/release/bundle/nsis/demo_0.1.0_x64-setup.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Debug - list files
        shell: pwsh
        run: |
          Get-Location
          Get-ChildItem -Recurse -File -Depth 2 | Select-Object FullName

      - name: Generate and upload update manifests
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 1. 读取版本号（尝试多种方式）
          $version = $null

          # 方式一：从 tauri.conf.json 读取
          $tauriConfPath = "src-tauri/tauri.conf.json"
          if (Test-Path $tauriConfPath) {
            try {
              $tauriConf = Get-Content $tauriConfPath -Raw -Encoding UTF8 | ConvertFrom-Json
              # 兼容 Tauri v1 (package.version) 和 v2 (顶层 version)
              if ($tauriConf.package -and $tauriConf.package.version) {
                $version = $tauriConf.package.version
              } elseif ($tauriConf.version) {
                $version = $tauriConf.version
              }
            } catch {
              Write-Host "Failed to parse tauri.conf.json: $_"
            }
          } else {
            Write-Host "tauri.conf.json not found at $tauriConfPath"
          }

          # 方式二：如果没读到，从生成的安装包文件名提取
          if (-not $version) {
            Write-Host "Attempting to extract version from built installer filename..."
            $nsisFiles = Get-ChildItem "src-tauri/target/release/bundle/nsis/*.exe"
            if ($nsisFiles.Count -gt 0) {
              $fileName = $nsisFiles[0].Name
              if ($fileName -match 'demo_([^_]+)_x64-setup\.exe') {
                $version = $matches[1]
                Write-Host "Extracted version: $version from $fileName"
              }
            }
          }

          if (-not $version) {
            Write-Host "ERROR: Could not determine version"
            exit 1
          }

          Write-Host "Using version: $version"

          # 判断是否为预发布版本
          $isPrerelease = $true   # 当前 main 触发均为预发布，后续可按需调整
          Write-Host "Is prerelease: $isPrerelease"

          $repo = "$env:GITHUB_REPOSITORY"
          $tag = "${{ steps.tag.outputs.TAG_NAME }}"
          $filename = "demo_${version}_x64-setup.exe"
          $signatureFile = "src-tauri/target/release/bundle/nsis/${filename}.sig"

          if (-not (Test-Path $signatureFile)) {
              Write-Host "ERROR: Signature file not found: $signatureFile"
              Write-Host "Available files in NSIS directory:"
              Get-ChildItem "src-tauri/target/release/bundle/nsis" | Select-Object Name
              exit 1
          }

          $signature = Get-Content $signatureFile -Raw
          $url = "https://github.com/$repo/releases/download/$tag/$filename"

          $updateJson = @{
              version   = $version
              notes     = "Release $tag"
              pub_date  = (Get-Date -Format "yyyy-MM-ddTHH:mm:ssZ")
              platforms = @{
                  "windows-x86_64" = @{
                      signature = $signature
                      url       = $url
                  }
              }
              forceUpdate = $false
          }

          if ($isPrerelease) {
              $updateJson | ConvertTo-Json -Depth 10 | Set-Content "beta_latest.json" -Encoding UTF8
              gh release delete-asset $tag "beta_latest.json" -y 2>$null
              gh release upload $tag "beta_latest.json" --clobber
              Write-Host "测试版：已上传 beta_latest.json（$version）"
          } else {
              $updateJson | ConvertTo-Json -Depth 10 | Set-Content "stable_latest.json" -Encoding UTF8
              $updateJson | ConvertTo-Json -Depth 10 | Set-Content "beta_latest.json" -Encoding UTF8

              $latestJson = $updateJson.Clone()
              $latestJson["stableJson"] = "https://github.com/$repo/releases/latest/download/stable_latest.json"
              $latestJson["betaJson"]   = "https://github.com/$repo/releases/latest/download/beta_latest.json"
              $latestJson | ConvertTo-Json -Depth 10 | Set-Content "latest.json" -Encoding UTF8

              gh release delete-asset $tag "latest.json" -y 2>$null
              gh release upload $tag "latest.json" --clobber
              gh release delete-asset $tag "stable_latest.json" -y 2>$null
              gh release upload $tag "stable_latest.json" --clobber
              gh release delete-asset $tag "beta_latest.json" -y 2>$null
              gh release upload $tag "beta_latest.json" --clobber

              Write-Host "正式版：已更新 latest.json / stable_latest.json / beta_latest.json（$version）"
          }
      - name: Deploy update manifests to GitHub Pages
        if: success()
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
          publish_branch: gh-pages
          destination_dir: ./
          keep_files: false
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
          commit_message: 'Update update manifests'