name: Release on Main Push

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install frontend dependencies
        run: bun install

      - name: Install Tauri CLI globally
        run: bun install -g @tauri-apps/cli

      - name: Build the app with Bun
        run: bun tauri build
        env:
          CI: false
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}

      - name: Get version from tag or commit
        id: version
        run: |
          # 尝试从标签获取版本，否则使用 commit hash
          $tag = "${{ github.ref_name }}"
          if ($tag -match '^v\d+\.\d+\.\d+') {
            $version = $tag -replace '^v', ''
          } else {
            $version = "${{ github.sha }}".Substring(0, 7)
          }
          echo "VERSION=$version" >> $env:GITHUB_OUTPUT
        shell: pwsh

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.sha }}
          name: "PakePlus v${{ steps.version.outputs.VERSION }}"
          body: "Built from commit ${{ github.sha }}"
          draft: false
          prerelease: true
          files: |
            src-tauri/target/release/PakePlus.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
